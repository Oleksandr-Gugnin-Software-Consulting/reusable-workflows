name: Reusable Detect Changes

on:
  workflow_call:
    inputs:
      core_paths:
        required: false
        type: string
        default: |
          app/**
          src/**
          scripts/**
          pyproject.toml
          setup.py
          requirements*.txt
      tests_paths:
        required: false
        type: string
        default: |
          tests/**
          pytest.ini
          conftest.py
      docs_paths:
        required: false
        type: string
        default: |
          docs/**
          README.md
          CHANGELOG.md
          *.md
      docker_paths:
        required: false
        type: string
        default: |
          Dockerfile
          docker-compose*.yml
          .dockerignore
          docker-entrypoint.sh
      ci_paths:
        required: false
        type: string
        default: |
          .github/workflows/**
    outputs:
      core:
        description: Core application files changed.
        value: ${{ jobs.detect.outputs.core }}
      tests:
        description: Test files changed.
        value: ${{ jobs.detect.outputs.tests }}
      docs:
        description: Documentation files changed.
        value: ${{ jobs.detect.outputs.docs }}
      docker:
        description: Docker-related files changed.
        value: ${{ jobs.detect.outputs.docker }}
      ci:
        description: CI configuration changed.
        value: ${{ jobs.detect.outputs.ci }}

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: Detect changed files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      core: ${{ steps.detect.outputs.core }}
      tests: ${{ steps.detect.outputs.tests }}
      docs: ${{ steps.detect.outputs.docs }}
      docker: ${{ steps.detect.outputs.docker }}
      ci: ${{ steps.detect.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Categorize changed files
        id: detect
        env:
          CORE_PATHS: ${{ inputs.core_paths }}
          TESTS_PATHS: ${{ inputs.tests_paths }}
          DOCS_PATHS: ${{ inputs.docs_paths }}
          DOCKER_PATHS: ${{ inputs.docker_paths }}
          CI_PATHS: ${{ inputs.ci_paths }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="${{ github.event.before }}"
            if [[ -z "$base_ref" || "$base_ref" == "0000000000000000000000000000000000000000" ]]; then
              base_ref="origin/main"
            fi
          fi

          git fetch origin "$base_ref":refs/remotes/origin/base || git fetch --all --prune || true
          changed_files="$(git diff --name-only "$base_ref"...HEAD 2>/dev/null || git diff --name-only HEAD~1...HEAD)"

          echo "Changed files:"
          echo "$changed_files"

          export CHANGED_FILES="$changed_files"

          /usr/bin/python3 <<'PY'
          import fnmatch
          import os
          from pathlib import Path

          changed_files = [line.strip() for line in os.environ.get("CHANGED_FILES", "").splitlines() if line.strip()]

          def read_patterns(name: str) -> list[str]:
              return [line.strip() for line in os.environ.get(name, "").splitlines() if line.strip()]

          categories = {
              "core": read_patterns("CORE_PATHS"),
              "tests": read_patterns("TESTS_PATHS"),
              "docs": read_patterns("DOCS_PATHS"),
              "docker": read_patterns("DOCKER_PATHS"),
              "ci": read_patterns("CI_PATHS"),
          }

          matches = {name: False for name in categories}
          for file_path in changed_files:
              normalized = str(Path(file_path).as_posix())
              for name, patterns in categories.items():
                  if any(fnmatch.fnmatch(normalized, pattern) for pattern in patterns):
                      matches[name] = True

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              for name, value in matches.items():
                  handle.write(f"{name}={'true' if value else 'false'}\n")

          github_summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with github_summary.open("a", encoding="utf-8") as handle:
              handle.write("### File Change Detection Results\n")
              for name, value in matches.items():
                  handle.write(f"- {name}: {'true' if value else 'false'}\n")
          PY