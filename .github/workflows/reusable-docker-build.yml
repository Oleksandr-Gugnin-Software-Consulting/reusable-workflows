name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: .
      context:
        required: false
        type: string
        default: .
      dockerfile:
        required: false
        type: string
        default: ./Dockerfile
      tag:
        required: false
        type: string
        default: app:test
      container_name:
        required: false
        type: string
        default: docker-smoke-test
      run_args:
        required: false
        type: string
        default: ''
      healthcheck_url:
        required: true
        type: string
      startup_seconds:
        required: false
        type: number
        default: 10
      image_size_limit_mb:
        required: false
        type: number
        default: 500

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          set -euo pipefail
          docker build -t "${{ inputs.tag }}" -f "${{ inputs.dockerfile }}" "${{ inputs.context }}"

      - name: Run smoke container
        run: |
          set -euo pipefail
          docker rm -f "${{ inputs.container_name }}" >/dev/null 2>&1 || true
          if [[ -n "${{ inputs.run_args }}" ]]; then
            eval "docker run -d --name '${{ inputs.container_name }}' ${{ inputs.run_args }} '${{ inputs.tag }}'"
          else
            docker run -d --name "${{ inputs.container_name }}" "${{ inputs.tag }}"
          fi
          sleep "${{ inputs.startup_seconds }}"
          if ! curl -fsS "${{ inputs.healthcheck_url }}" >/dev/null; then
            docker logs "${{ inputs.container_name }}"
            exit 1
          fi

      - name: Show container logs
        if: ${{ always() }}
        run: docker logs "${{ inputs.container_name }}"

      - name: Check image size
        run: |
          set -euo pipefail
          image_size_bytes="$(docker image inspect '${{ inputs.tag }}' --format='{{.Size}}')"
          image_size_mb="$((image_size_bytes / 1024 / 1024))"
          echo "Image size: ${image_size_mb}MB"
          if (( image_size_mb > ${{ inputs.image_size_limit_mb }} )); then
            echo "Image size exceeds limit: ${image_size_mb}MB > ${{ inputs.image_size_limit_mb }}MB" >&2
            exit 1
          fi

      - name: Cleanup smoke container
        if: ${{ always() }}
        run: docker rm -f "${{ inputs.container_name }}" >/dev/null 2>&1 || true